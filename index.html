<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>VibeStream Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">VibeStream</div>
            <nav>
                <div class="nav-item active" id="nav-home">🏠 Home</div>
                <div class="nav-item" id="nav-recent">🕒 Recent</div>
            </nav>
            <div class="upload-area">
                <label class="upload-label">
                    + ADD MUSIC
                    <input type="file" id="music-input" multiple accept="audio/*" hidden>
                </label>
            </div>
            <button id="theme-btn" class="theme-btn">🌓 Toggle Theme</button>
        </aside>

        <main class="main-content">
            <div class="hero-section">
                <div class="album-art" id="art"></div>
                <div class="hero-info">
                    <h1 id="current-title">No Songs</h1>
                    <p id="current-artist">Ready to play</p>
                </div>
            </div>

            <div class="table-holder">
                <table>
                    <thead>
                        <tr><th>#</th><th>TITLE</th><th>ACTION</th></tr>
                    </thead>
                    <tbody id="track-list"></tbody>
                </table>
            </div>
        </main>

        <footer class="player-bar">
            <div class="bar-left">
                <div id="mini-title">---</div>
            </div>

            <div class="bar-center">
                <div class="controls">
                    <button id="prev-btn">⏮</button>
                    <button id="play-btn">▶</button>
                    <button id="next-btn">⏭</button>
                </div>
                <div class="progress-container">
                    <span id="time-cur">0:00</span>
                    <div class="bar-bg" id="bar-click"><div class="bar-fill" id="bar-fill"></div></div>
                    <span id="time-dur">0:00</span>
                </div>
            </div>

            <div class="bar-right">
                <div class="volume-control">
                    <span id="vol-icon">🔊</span>
                    <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.7">
                </div>
            </div>
        </footer>
    </div>
    <audio id="main-audio"></audio>
    <script src="script.js"></script>
</body>
</html>
